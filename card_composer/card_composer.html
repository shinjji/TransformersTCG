<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARD COMPOSER</title>
<link rel="icon" type="image/png" href="https://wsrv.nl/?url=https://drive.google.com/uc?export=view%26id=1fzWFPem8tnny1MTXyDgVMYxo1KbbxOVK&output=webp&q=90">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="card_composer.css?v=5">
</head>
<body>

<header>
  <h1>TRANSFORMERS TCG</h1>
  <span class="subtitle">Card Composer</span>
  <div class="composer-tabs" id="composerTabs">
    <button class="composer-tab active" data-composer="character"      onclick="switchComposer('character')">Character</button>
    <button class="composer-tab"        data-composer="battle_action"  onclick="switchComposer('battle_action')">Battle</button>
  </div>
  <span class="tag" style="margin-left:auto;">v1.0</span>
</header>

<div class="app" id="appMount">
  <!-- Active composer injects controls + preview + progress panel here -->
</div>

<!-- Scripts: bundle first, then shared utilities, then each composer -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
  crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="card_components_bundle.js"></script>
<script src="card_composer_shared.js"></script>
<script src="composers/character.js"></script>
<script src="composers/battle_action.js"></script>

<script>
  // ── Shell controller ────────────────────────────────────────────────
  let _activeComposer = null;
  let _activeKey = null;

  function switchComposer(key) {
    if (key === _activeKey) return;
    _activeKey = key;
    try { localStorage.setItem('tfComposerKey', key); } catch(e) {}
    // Update tab active state
    document.querySelectorAll('.composer-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.composer === key);
    });
    if (_activeComposer && _activeComposer.destroy) _activeComposer.destroy();
    const mountEl = document.getElementById('appMount');
    mountEl.innerHTML = '';
    _activeComposer = window.Composers[key];
    if (_activeComposer) _activeComposer.init(mountEl);
  }

  // Inject fonts once (shared across all composers)
  injectBundledFonts();

  // Restore last active composer, defaulting to character
  const _savedKey = (() => { try { return localStorage.getItem('tfComposerKey'); } catch(e) { return null; } })();
  switchComposer((_savedKey && window.Composers[_savedKey]) ? _savedKey : 'character');
</script>

</body>
</html>
